<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBot - AI Medical Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #10b981;
            --bg: #f0f9ff;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 900px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 20px;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .header-info h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .header-info p {
            font-size: 0.8rem;
            opacity: 0.85;
            font-weight: 300;
        }

        .status-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8fafc;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        .message.bot .disclaimer {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }

        /* Loading Animation */
        .loading {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 18px 24px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow);
        }

        .loading.active {
            display: flex;
        }

        .loading-dots {
            display: flex;
            gap: 6px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .loading-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Input Area */
        .chat-input-area {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }

        .chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
            background: var(--surface);
        }

        .chat-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .welcome-message h2 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .welcome-message p {
            font-size: 0.9rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .chip {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f0f9ff;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            body {
                align-items: flex-end;
            }

            .chat-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                margin: 0;
            }

            .chat-header {
                padding: 14px 16px;
            }

            .bot-avatar {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .header-info h1 {
                font-size: 1.1rem;
            }

            .chat-messages {
                padding: 16px;
            }

            .message {
                max-width: 92%;
                padding: 12px 14px;
                font-size: 0.9rem;
            }

            .chat-input-area {
                padding: 12px 16px;
            }

            .chat-input {
                padding: 12px 14px;
            }

            .send-btn {
                padding: 12px 18px;
            }

            .send-btn span {
                display: none;
            }
        }

        @media (max-width: 380px) {
            .status-badge {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="bot-avatar">🩺</div>
            <div class="header-info">
                <h1>MedBot</h1>
                <p>AI Medical Assistant</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Online
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <h2>Welcome to MedBot 👋</h2>
                <p>I am your AI medical assistant. Ask me anything about medical topics, and I will provide evidence-based answers from trusted medical documents.</p>
                <div class="suggestion-chips">
                    <div class="chip" onclick="sendChip('What are common symptoms of diabetes?')">Diabetes symptoms</div>
                    <div class="chip" onclick="sendChip('How to manage hypertension?')">Hypertension</div>
                    <div class="chip" onclick="sendChip('What is the flu vaccine schedule?')">Flu vaccine</div>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="loading-text">MedBot is thinking...</span>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <input
                type="text"
                class="chat-input"
                id="user-input"
                placeholder="Type your medical question..."
                autocomplete="off"
            >
            <button class="send-btn" id="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <span>Send</span>
            </button>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function appendMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            if (!isUser && text.includes('⚠️')) {
                // Add disclaimer styling for safety messages
                messageDiv.innerHTML = text.replace(
                    /(⚠️.*?)(?=<|$)/s,
                    '<div class="disclaimer">$1</div>'
                ) + `<div class="message-time">${getCurrentTime()}</div>`;
            } else {
                messageDiv.innerHTML = text + `<div class="message-time">${getCurrentTime()}</div>`;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function setLoading(isLoading) {
            loading.classList.toggle('active', isLoading);
            sendBtn.disabled = isLoading;
            userInput.disabled = isLoading;
            if (!isLoading) userInput.focus();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Remove welcome message on first interaction
            const welcome = messagesContainer.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            appendMessage(message, true);
            userInput.value = '';
            setLoading(true);

            try {
                const response = await fetch('/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ msg: message }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const answer = await response.text();
                appendMessage(answer, false);
            } catch (error) {
                console.error('Chat error:', error);
                appendMessage(
                    'I apologize, but I am unable to respond right now. Please check your connection and try again.',
                    false
                );
            } finally {
                setLoading(false);
            }
        }

        function sendChip(text) {
            userInput.value = text;
            sendMessage();
        }

        // Enter key support
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-focus input on load
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
